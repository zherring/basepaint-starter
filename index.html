<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="agents.md" content="https://basepaint.xyz/ai.txt" />
<title>BasePaint Starter</title>
<style>
  /* BasePaint design system (from basepaint.xyz/ai.txt): dark bg, mono type, yellow accent */
  :root {
    --bg: #1e2735;
    --panel: #141b26;
    --text: #e8e8e8;
    --dim: #8a94a6;
    --accent: #fde047;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Roboto Mono", ui-monospace, Menlo, monospace;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  main { width: 100%; max-width: 640px; }
  h1 { font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; }
  h1 span { color: var(--accent); }
  .canvas-frame {
    background: var(--panel);
    border: 1px solid #2c3648;
    padding: 1rem;
  }
  .canvas-frame img {
    width: 100%;
    display: block;
    /* Canvases are low-res pixel art — never smooth them */
    image-rendering: pixelated;
  }
  .meta { display: flex; justify-content: space-between; margin: 0.75rem 0 0; font-size: 0.8rem; }
  .meta .theme { color: var(--accent); }
  .meta .stats { color: var(--dim); }
  .palette { display: flex; gap: 4px; margin-top: 0.75rem; }
  .palette div { flex: 1; height: 20px; border: 1px solid #0008; }
  footer { margin-top: 1.5rem; font-size: 0.75rem; color: var(--dim); line-height: 1.6; }
  footer a { color: var(--accent); }
</style>
</head>
<body>
<main>
  <h1>BasePaint <span id="day">day —</span></h1>

  <div class="canvas-frame">
    <img id="canvas" alt="Today's BasePaint canvas, repainted live" />
    <div class="meta">
      <span class="theme" id="theme">loading…</span>
      <span class="stats" id="stats"></span>
    </div>
    <div class="palette" id="palette"></div>
  </div>

  <footer>
    A minimal, zero-dependency window into today's live canvas.
    Fork it and make it yours — data docs for humans and AIs at
    <a href="https://basepaint.xyz/ai.txt">basepaint.xyz/ai.txt</a>.
  </footer>
</main>

<script>
// ---------------------------------------------------------------------------
// 1. What day is it? One canvas per day; day 1 started at the timestamp below
//    (BasePaint contract: startedAt=1691599315, epochDuration=86400).
// ---------------------------------------------------------------------------
const START = 1691599315;
const day = Math.floor((Date.now() / 1000 - START) / 86400) + 1;
document.getElementById("day").textContent = "day " + day;

// ---------------------------------------------------------------------------
// 2. Today's theme + palette — the cleanest public JSON endpoint (CORS on).
// ---------------------------------------------------------------------------
fetch(`https://basepaint.xyz/api/theme/${day}`)
  .then((r) => r.json())
  .then(({ theme, palette }) => {
    document.getElementById("theme").textContent = `“${theme}”`;
    document.getElementById("palette").innerHTML = palette
      .map((c) => `<div style="background:${c}" title="${c}"></div>`)
      .join("");
  });

// ---------------------------------------------------------------------------
// 3. The canvas itself, refreshed every 30s while people paint.
//    (Finished days live forever at https://basepaint.net/v3/<day>.png)
// ---------------------------------------------------------------------------
const img = document.getElementById("canvas");
function refresh() {
  img.src = `https://basepaint.xyz/api/art/image?day=${day}&scale=4&t=${Date.now()}`;
}
refresh();
setInterval(refresh, 30_000);

// ---------------------------------------------------------------------------
// 4. Live stats from the public GraphQL indexer (https://graphql.basepaint.xyz)
//    — the answer to nearly every "how do I get BasePaint data" question.
// ---------------------------------------------------------------------------
fetch("https://graphql.basepaint.xyz/", {
  method: "POST",
  headers: { "content-type": "application/json" },
  body: JSON.stringify({
    query: `{ canvas(id: ${day}) { totalArtists pixelsCount } }`,
  }),
})
  .then((r) => r.json())
  .then(({ data }) => {
    if (!data?.canvas) return;
    const { totalArtists, pixelsCount } = data.canvas;
    document.getElementById("stats").textContent =
      `${totalArtists} artists · ${pixelsCount.toLocaleString()} px`;
  });
</script>
</body>
</html>
